services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  fake-sms:
    build: .
    ports:
      - "8002:8002"
    env_file: .env
    volumes:
      - sqlite_data:/app/db
      - static_files:/app/staticfiles

    networks:
      - backend
    depends_on:
      redis:
        condition: service_healthy
    command: >
      sh -c "mkdir -p /app/db &&
             python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn fake_sms.wsgi:application --bind 0.0.0.0:8002 --workers 1"

volumes:
  redis_data:
  sqlite_data:
  static_files:

networks:
  backend:
    external: true