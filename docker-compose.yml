services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - sqlite_data:/app/db          # SQLite DB persistence
      - static_files:/app/staticfiles
    depends_on:
      redis:
        condition: service_healthy
    command: >
      sh -c "mkdir -p /app/db &&
             python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn fake_sms.wsgi:application --bind 0.0.0.0:8000 --workers 1"

volumes:
  redis_data:
  sqlite_data:
  static_files:
